# Ambiente de desenvolvimento local (Postgres + API FastAPI).
# As credenciais do banco NÃO ficam neste arquivo: vêm do `.env` da raiz (ignorado pelo Git),
# cujo modelo é o `.env.example`. A sintaxe `${VAR:?mensagem}` faz o compose falhar cedo,
# com mensagem clara, se a variável não estiver definida — em vez de subir com um default fraco.
#
# `name:` explícito (item S9): sem isso, o Compose usa o nome da PASTA como projeto — o mesmo
# nome que o docker-compose.prod.yml usaria por padrão. Isso faz o Compose achar que os serviços
# `db`/`backend` de um arquivo são "o mesmo serviço" do outro e RECRIA (substitui) os containers
# do outro compose ao subir este. Nomes de projeto diferentes isolam os dois ambientes de vez.
# Mantido igual ao nome de projeto implícito anterior (nome da pasta, "facilichat") de propósito:
# um valor diferente mudaria o nome real do volume `pgdata` (viraria `<novo-nome>_pgdata`), órfão
# de todo o volume `facilichat_pgdata` já existente com dados de dev.
name: facilichat

services:
  db:
    image: postgres:16
    container_name: facilichat_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?defina POSTGRES_USER no .env da raiz (veja .env.example)}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD no .env da raiz (veja .env.example)}
      POSTGRES_DB: ${POSTGRES_DB:?defina POSTGRES_DB no .env da raiz (veja .env.example)}
    ports:
      # Exposto apenas para localhost em dev; os containers usam a rede interna do Compose.
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Healthcheck: só libera o backend depois que o Postgres aceitar conexões
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 10

  # API FastAPI — construída a partir de backend/Dockerfile
  backend:
    build: ./backend
    container_name: facilichat_backend
    # Carrega JWT_SECRET, ANTHROPIC_API_KEY, CORS_ORIGINS etc. do .env do backend
    env_file:
      - ./backend/.env
    environment:
      # Dentro da rede do compose o host do banco é o serviço "db" (não "localhost").
      # Esta variável sobrescreve a DATABASE_URL do .env, que aponta para localhost.
      # A URL é montada a partir das mesmas variáveis do serviço `db`, para que a senha
      # exista em um lugar só e não haja como os dois lados saírem de sincronia.
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    ports:
      - "8000:8000"
    # Espera o banco ficar saudável antes de subir (evita erro de conexão no create_all)
    depends_on:
      db:
        condition: service_healthy
    # Monta o código local no container para refletir mudanças sem rebuild (--reload)
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
